# Unlock Julian
julian=0

# Disable Julian HP regen
balanced_julian=0

# Running costs 0PM
free_run=0

# Jumping costs 0MP
free_jump=0

# Supers cost 0MP
free_supers=0

# Weapon drop rate: 0=off, 1=normal, 2=double, 3=triple
spawn_weapons=1

# Bow, Shuriken, Bomb, Head, Ice Sword fall from the sky
all_weapons=0

# 2x MP recovery
fast_mp=0

# VSync wait for vertical retrace
vsync=1

# Supers cost half MP
cheap_supers=0

# Single-key supers: Q/E/Z (P1), U/O/M (P2), Num7/9/1 (P3)
