# Little Fighter 1 - Mods
# Edit options below. Changes apply on next game launch.

# Unlock Julian as a playable character without pressing F1
julian=0

# Running no longer drains MP
free_run=0

# Jumping no longer costs MP
free_jump=0

# Supers no longer cost MP
free_supers=0

# Weapon drop rate: 0=off, 1=normal, 2=double, 3=triple
spawn_weapons=1

# Head and Ice-Sword can also fall from the sky
all_weapons=0

# MP recovers 2x as fast for everyone
fast_mp=0

# VSync: wait for vertical retrace before drawing
vsync=1

# Supers cost half their normal MP
cheap_supers=0

# Single-key supers: Q/E/Z (P1), U/O/M (P2), Num7/9/1 (P3)
easy_supers=1

# Background music, press F11 in-game to mute/unmute.
bgm=1

# Game speed (PIT Hz): 18.2=normal, higher=faster, max 200
game_speed=18.2
