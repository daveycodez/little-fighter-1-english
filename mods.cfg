# Enables background music, press F11 to mute/unmute. Requires MIDI/SoundFont set up.
bgm=1

# Super move hits no longer grant MP to the attacker
no_mp_on_hit=0

# CPU opponents stay idle
practice=0

# Game speed (PIT Hz): 18.2=normal, higher=faster, max 200
game_speed=18.2

# Players can't walk off-screen
fix_camera=1
